services:
  - type: web
    name: gms-attendance-server
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLOUD_MODE
        value: "true"
      - key: SQLITE_BACKUP_ENABLED
        value: "false"
      - key: PGSSL
        value: "true"
      - key: TRUST_PROXY
        value: "true"
      - key: DEVICE_TIMEZONE
        value: Asia/Manila
      - key: DATABASE_URL
        sync: false
      - key: API_KEY
        sync: false
      - key: EMERGENCY_ATTENDANCE_PASSWORD
        sync: false
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: HR_USERNAME
        sync: false
      - key: HR_PASSWORD
        sync: false
      - key: VIEWER_USERNAME
        sync: false
      - key: VIEWER_PASSWORD
        sync: false
      - key: DEVICE_API_KEYS
        sync: false
